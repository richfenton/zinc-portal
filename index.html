<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MyAccount — Zinc Group</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
:root{--brand-primary:#1a3a5c;--brand-accent:#0ea5e9;--brand-light:#e0f2fe;--brand-success:#059669;--brand-warning:#d97706;--brand-danger:#dc2626;--surface:#ffffff;--surface-2:#f8fafc;--surface-3:#f1f5f9;--border:#e2e8f0;--text-primary:#0f172a;--text-secondary:#64748b;--text-muted:#94a3b8;--radius:12px;--radius-sm:8px;--shadow:0 1px 3px rgba(0,0,0,0.06),0 4px 16px rgba(0,0,0,0.05);--font:'DM Sans',sans-serif;--font-display:'DM Serif Display',serif;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--font);background:var(--surface-2);color:var(--text-primary);min-height:100vh;font-size:15px;line-height:1.6;-webkit-font-smoothing:antialiased;}
.access-bar{background:#0f2a45;color:rgba(255,255,255,0.65);padding:7px 20px;font-size:12px;display:flex;gap:16px;align-items:center;flex-wrap:wrap;}
.access-bar a{color:var(--brand-accent);text-decoration:none;}
.topbar{background:var(--brand-primary);color:white;padding:0 24px;height:62px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200;box-shadow:0 2px 16px rgba(0,0,0,0.18);}
.topbar-logo{display:flex;align-items:center;gap:10px;}
.topbar-logo-text{font-family:var(--font-display);font-size:21px;color:white;}
.topbar-logo-text span{color:var(--brand-accent);}
.topbar-logo-pill{background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.2);border-radius:20px;padding:2px 10px;font-size:11px;color:rgba(255,255,255,0.7);font-weight:500;}
.topbar-right{display:flex;align-items:center;gap:10px;}
.topbar-user{font-size:13px;color:rgba(255,255,255,0.65);}
.topbar-avatar{width:34px;height:34px;background:var(--brand-accent);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:white;cursor:pointer;flex-shrink:0;}
.topbar-logout{display:flex;align-items:center;gap:6px;padding:7px 14px;border-radius:var(--radius-sm);border:1px solid rgba(255,255,255,0.2);background:transparent;color:rgba(255,255,255,0.75);font-family:var(--font);font-size:13px;font-weight:500;cursor:pointer;transition:all 0.15s;}
.topbar-logout:hover{background:rgba(255,255,255,0.1);color:white;}
.mobile-menu-btn{display:none;background:none;border:none;color:white;cursor:pointer;padding:6px;}
@media(max-width:768px){.mobile-menu-btn{display:flex;align-items:center;}.topbar-user{display:none;}}
.app{display:flex;flex-direction:column;min-height:100vh;}
.main-layout{display:flex;flex:1;max-width:1120px;margin:0 auto;width:100%;padding:28px 20px;gap:24px;}
.sidebar{width:240px;flex-shrink:0;display:flex;flex-direction:column;gap:12px;}
.sidebar-account-card{background:linear-gradient(145deg,#1a3a5c 0%,#0d2540 100%);border-radius:var(--radius);padding:20px;color:white;}
.sac-label{font-size:11px;text-transform:uppercase;letter-spacing:0.9px;color:rgba(255,255,255,0.45);margin-bottom:4px;font-weight:600;}
.sac-balance{font-family:var(--font-display);font-size:30px;color:white;line-height:1;margin-bottom:14px;}
.sac-client{font-size:13px;color:rgba(255,255,255,0.8);font-weight:500;margin-bottom:2px;}
.sac-ref{font-size:11px;color:rgba(255,255,255,0.45);}
.sac-divider{border:none;border-top:1px solid rgba(255,255,255,0.1);margin:12px 0;}
.sac-pay-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:10px;background:var(--brand-accent);border:none;border-radius:var(--radius-sm);color:white;font-family:var(--font);font-size:13px;font-weight:600;cursor:pointer;transition:all 0.15s;}
.sac-pay-btn:hover{background:#0284c7;}
.sac-pay-btn svg{width:16px;height:16px;}
.nav-section-label{font-size:10px;text-transform:uppercase;letter-spacing:0.8px;color:var(--text-muted);font-weight:700;padding:0 12px;margin-bottom:4px;}
.nav-menu{display:flex;flex-direction:column;gap:1px;}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:var(--radius-sm);cursor:pointer;color:var(--text-secondary);font-size:14px;font-weight:500;transition:all 0.15s;border:none;background:none;width:100%;text-align:left;}
.nav-item:hover{background:var(--surface-3);color:var(--text-primary);}
.nav-item.active{background:var(--brand-light);color:var(--brand-primary);font-weight:600;}
.nav-item.danger{color:var(--brand-danger);}
.nav-item.danger:hover{background:#fee2e2;}
.nav-svg{width:18px;height:18px;flex-shrink:0;color:var(--text-muted);}
.nav-item:hover .nav-svg,.nav-item.active .nav-svg{color:inherit;}
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:150;}
.sidebar-overlay.open{display:block;}
@media(max-width:768px){
  .sidebar{position:fixed;left:-280px;top:0;bottom:0;width:280px;z-index:160;background:var(--surface);padding:20px 16px;overflow-y:auto;transition:left 0.25s ease;box-shadow:0 8px 32px rgba(0,0,0,0.2);}
  .sidebar.open{left:0;}
  .main-layout{padding:16px;}
}
.content{flex:1;min-width:0;}
.card{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);padding:24px;box-shadow:var(--shadow);margin-bottom:16px;}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;}
.card-title{font-size:15px;font-weight:600;color:var(--text-primary);display:flex;align-items:center;gap:8px;}
.card-title-svg{width:18px;height:18px;color:var(--brand-accent);flex-shrink:0;}
.card-link{font-size:13px;color:var(--brand-accent);font-weight:500;cursor:pointer;}
.card-link:hover{text-decoration:underline;}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:11px 22px;border-radius:var(--radius-sm);font-family:var(--font);font-size:14px;font-weight:600;cursor:pointer;border:none;transition:all 0.15s;text-decoration:none;white-space:nowrap;}
.btn-primary{background:var(--brand-primary);color:white;}
.btn-primary:hover{background:#0f2a45;transform:translateY(-1px);box-shadow:0 4px 14px rgba(26,58,92,0.3);}
.btn-primary:disabled{opacity:0.45;cursor:not-allowed;transform:none;box-shadow:none;}
.btn-accent{background:var(--brand-accent);color:white;}
.btn-accent:hover{background:#0284c7;}
.btn-outline{background:transparent;color:var(--brand-primary);border:1.5px solid var(--brand-primary);}
.btn-outline:hover{background:var(--brand-light);}
.btn-ghost{background:transparent;color:var(--text-secondary);border:1px solid var(--border);}
.btn-ghost:hover{background:var(--surface-3);color:var(--text-primary);}
.btn-lg{padding:14px 28px;font-size:15px;border-radius:var(--radius);}
.btn-sm{padding:7px 14px;font-size:13px;border-radius:6px;}
.btn-block{width:100%;}
.btn svg{width:16px;height:16px;}
.form-group{margin-bottom:18px;}
.form-label{display:block;font-size:12px;font-weight:700;color:var(--text-secondary);margin-bottom:6px;text-transform:uppercase;letter-spacing:0.5px;}
.form-input{width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-family:var(--font);font-size:15px;color:var(--text-primary);background:var(--surface);transition:border-color 0.15s,box-shadow 0.15s;outline:none;}
.form-input:focus{border-color:var(--brand-accent);box-shadow:0 0 0 3px rgba(14,165,233,0.1);}
.form-select{width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-family:var(--font);font-size:15px;background:var(--surface);color:var(--text-primary);outline:none;cursor:pointer;}
.form-select:focus{border-color:var(--brand-accent);}
.form-hint{font-size:12px;color:var(--text-muted);margin-top:5px;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
@media(max-width:500px){.form-row{grid-template-columns:1fr;}}
.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:600;}
.badge-blue{background:var(--brand-light);color:var(--brand-primary);}
.badge-green{background:#d1fae5;color:#065f46;}
.badge-amber{background:#fef3c7;color:#92400e;}
.badge-red{background:#fee2e2;color:#991b1b;}
.page-header{margin-bottom:24px;}
.page-title{font-family:var(--font-display);font-size:26px;color:var(--text-primary);margin-bottom:3px;}
.page-subtitle{font-size:14px;color:var(--text-secondary);}
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:16px;}
@media(max-width:600px){.stat-grid{grid-template-columns:1fr 1fr;}}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px;box-shadow:var(--shadow);}
.stat-label{font-size:11px;text-transform:uppercase;letter-spacing:0.7px;color:var(--text-muted);font-weight:700;margin-bottom:6px;}
.stat-value{font-family:var(--font-display);font-size:26px;color:var(--text-primary);line-height:1;}
.stat-sub{font-size:12px;color:var(--text-secondary);margin-top:5px;}
.stat-card.accent{background:var(--brand-primary);border-color:var(--brand-primary);}
.stat-card.accent .stat-label{color:rgba(255,255,255,0.5);}
.stat-card.accent .stat-value{color:white;}
.stat-card.accent .stat-sub{color:rgba(255,255,255,0.6);}
.tx-list{display:flex;flex-direction:column;}
.tx-item{display:flex;align-items:center;justify-content:space-between;padding:13px 0;border-bottom:1px solid var(--border);}
.tx-item:last-child{border-bottom:none;}
.tx-left{display:flex;align-items:center;gap:12px;}
.tx-icon{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.tx-icon svg{width:16px;height:16px;}
.tx-icon.credit{background:#d1fae5;color:#059669;}
.tx-icon.debit{background:#fee2e2;color:#dc2626;}
.tx-icon.plan{background:var(--brand-light);color:var(--brand-primary);}
.tx-desc{font-size:14px;font-weight:500;}
.tx-date{font-size:12px;color:var(--text-muted);}
.tx-amount{font-size:15px;font-weight:600;}
.tx-amount.credit{color:var(--brand-success);}
.tx-amount.debit{color:var(--brand-danger);}
.progress-wrap{background:var(--surface-3);border-radius:99px;height:8px;overflow:hidden;margin:8px 0;}
.progress-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--brand-accent),var(--brand-primary));transition:width 0.8s ease;}
.alert{padding:13px 16px;border-radius:var(--radius-sm);font-size:14px;display:flex;gap:10px;margin-bottom:16px;align-items:flex-start;line-height:1.5;}
.alert svg{width:18px;height:18px;flex-shrink:0;margin-top:1px;}
.alert-info{background:var(--brand-light);color:var(--brand-primary);border:1px solid #bae6fd;}
.alert-success{background:#d1fae5;color:#065f46;border:1px solid #6ee7b7;}
.alert-warning{background:#fef3c7;color:#92400e;border:1px solid #fcd34d;}
.alert-danger{background:#fee2e2;color:#991b1b;border:1px solid #fca5a5;}
.ie-section{margin-bottom:22px;}
.ie-section-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.7px;color:var(--text-muted);margin-bottom:10px;padding-bottom:8px;border-bottom:2px solid var(--surface-3);}
.ie-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--surface-3);}
.ie-row:last-child{border-bottom:none;}
.ie-row-label{font-size:14px;color:var(--text-primary);flex:1;}
.ie-input-wrap{display:flex;align-items:center;gap:4px;}
.ie-prefix{font-size:13px;color:var(--text-muted);font-weight:500;}
.ie-input{width:100px;padding:6px 10px;border:1.5px solid var(--border);border-radius:6px;font-family:var(--font);font-size:14px;text-align:right;outline:none;color:var(--text-primary);}
.ie-input:focus{border-color:var(--brand-accent);}
.ie-totals{background:var(--surface-3);border-radius:var(--radius-sm);padding:18px;margin-top:8px;}
.ie-total-row{display:flex;justify-content:space-between;font-size:14px;margin-bottom:8px;}
.ie-total-row.result{font-weight:700;font-size:16px;padding-top:8px;border-top:2px solid var(--border);margin-bottom:0;}
.ie-total-row.surplus{color:var(--brand-success);}
.ie-total-row.deficit{color:var(--brand-danger);}
.pay-methods{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;}
.pay-pill{display:flex;align-items:center;gap:8px;padding:10px 16px;border:2px solid var(--border);border-radius:var(--radius);cursor:pointer;font-size:14px;font-weight:500;transition:all 0.15s;background:var(--surface);}
.pay-pill:hover{border-color:var(--brand-accent);}
.pay-pill.selected{border-color:var(--brand-primary);background:var(--brand-light);color:var(--brand-primary);}
.pay-pill svg{width:18px;height:18px;}
.offer-card{background:linear-gradient(135deg,#0f2a45 0%,#1a3a5c 60%,#0e4c72 100%);border-radius:var(--radius);padding:28px;color:white;position:relative;overflow:hidden;margin-bottom:16px;}
.offer-card::before{content:'';position:absolute;top:-50px;right:-50px;width:200px;height:200px;border-radius:50%;background:rgba(14,165,233,0.12);}
.offer-badge{display:inline-flex;background:var(--brand-accent);color:white;padding:4px 12px;border-radius:20px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.7px;margin-bottom:12px;}
.offer-title{font-family:var(--font-display);font-size:24px;margin-bottom:8px;}
.offer-desc{font-size:14px;color:rgba(255,255,255,0.7);margin-bottom:20px;line-height:1.7;}
.offer-was{font-size:13px;color:rgba(255,255,255,0.4);text-decoration:line-through;margin-bottom:4px;}
.offer-amount{font-family:var(--font-display);font-size:40px;line-height:1;margin-bottom:20px;}
.bs-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:20px;}
@media(max-width:600px){.bs-grid{grid-template-columns:1fr;}}
.bs-point{display:flex;gap:10px;align-items:flex-start;padding:14px;background:var(--surface-3);border-radius:var(--radius-sm);}
.bs-icon{width:32px;height:32px;border-radius:50%;background:var(--brand-light);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.bs-icon svg{width:16px;height:16px;color:var(--brand-primary);}
.bs-point-title{font-size:13px;font-weight:700;margin-bottom:2px;}
.bs-point-desc{font-size:12px;color:var(--text-secondary);line-height:1.5;}
.auth-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(160deg,#0a1628 0%,#1a3a5c 55%,#0e4c72 100%);padding:24px;}
.auth-card{background:white;border-radius:20px;padding:40px;width:100%;max-width:440px;box-shadow:0 32px 80px rgba(0,0,0,0.35);}
.auth-logo{font-family:var(--font-display);font-size:22px;color:var(--brand-primary);margin-bottom:4px;}
.auth-logo span{color:var(--brand-accent);}
.auth-tagline{font-size:13px;color:var(--text-muted);margin-bottom:28px;}
.auth-title{font-size:20px;font-weight:700;color:var(--text-primary);margin-bottom:4px;}
.auth-subtitle{font-size:14px;color:var(--text-secondary);margin-bottom:24px;line-height:1.6;}
.auth-steps{display:flex;gap:6px;margin-bottom:28px;}
.auth-step{flex:1;height:3px;border-radius:99px;background:var(--surface-3);}
.auth-step.done{background:var(--brand-accent);}
.auth-step.active{background:var(--brand-primary);}
.auth-help{margin-top:20px;padding-top:20px;border-top:1px solid var(--border);font-size:12px;color:var(--text-muted);line-height:1.9;text-align:center;}
.summary-row{display:flex;justify-content:space-between;align-items:center;padding:11px 0;border-bottom:1px solid var(--border);font-size:14px;}
.summary-row:last-child{border-bottom:none;font-weight:700;font-size:15px;padding-top:14px;}
.summary-key{color:var(--text-secondary);}
.ob-providers{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px;}
@media(max-width:500px){.ob-providers{grid-template-columns:repeat(2,1fr);}}
.ob-provider{border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:16px 10px;text-align:center;cursor:pointer;transition:all 0.15s;}
.ob-provider:hover{border-color:var(--brand-accent);background:var(--brand-light);}
.ob-provider-logo{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 8px;font-size:15px;font-weight:700;}
.ob-provider-name{font-size:12px;font-weight:600;color:var(--text-secondary);}
.account-tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;}
.account-tab{display:flex;align-items:center;gap:8px;padding:8px 14px;border-radius:var(--radius-sm);border:1.5px solid var(--border);background:var(--surface);cursor:pointer;font-size:13px;font-weight:500;transition:all 0.15s;}
.account-tab.active{border-color:var(--brand-primary);background:var(--brand-light);color:var(--brand-primary);}
.schedule-block{border:2px dashed rgba(14,165,233,0.4);border-radius:var(--radius);padding:18px 20px;display:flex;align-items:center;justify-content:space-between;gap:16px;background:rgba(14,165,233,0.03);margin-bottom:16px;}
.schedule-block svg{width:38px;height:38px;color:var(--brand-accent);flex-shrink:0;}
.schedule-text{flex:1;}
.schedule-text strong{display:block;color:var(--text-primary);font-size:15px;margin-bottom:2px;}
.schedule-text span{font-size:13px;color:var(--text-secondary);}
.quick-actions{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
.quick-action{display:flex;flex-direction:column;align-items:center;gap:8px;padding:16px 12px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);cursor:pointer;transition:all 0.15s;font-size:12px;font-weight:600;color:var(--text-secondary);text-align:center;}
.quick-action:hover{border-color:var(--brand-accent);color:var(--brand-primary);background:var(--brand-light);}
.quick-action svg{width:22px;height:22px;color:var(--brand-accent);}
.success-screen{text-align:center;padding:40px 20px;}
.success-icon{width:64px;height:64px;background:#d1fae5;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;}
.success-icon svg{width:32px;height:32px;color:var(--brand-success);}
.success-title{font-family:var(--font-display);font-size:26px;margin-bottom:8px;}
.success-desc{font-size:14px;color:var(--text-secondary);margin-bottom:4px;}
.success-sub{font-size:13px;color:var(--text-muted);margin-bottom:28px;}
.portal-footer{background:var(--brand-primary);color:rgba(255,255,255,0.45);padding:22px 24px;font-size:11.5px;text-align:center;line-height:2;}
.portal-footer a{color:rgba(255,255,255,0.55);text-decoration:none;}
.hidden{display:none!important;}
.mt-8{margin-top:8px;}.mt-12{margin-top:12px;}.mt-16{margin-top:16px;}
.mb-16{margin-bottom:16px;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
.fade-in{animation:fadeUp 0.22s ease both;}
</style>
</head>
<body>
<div id="app"></div>
<script>
const I={
  home:`<svg class="nav-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>`,
  card:`<svg class="nav-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>`,
  cal:`<svg class="nav-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>`,

    ${S.payMethod==="card"?`
    <div class="form-row"><div class="form-group"><label class="form-label">Card number</label><input class="form-input" type="text" placeholder="1234 5678 9012 3456" maxlength="19"></div><div class="form-group"><label class="form-label">Name on card</label><input class="form-input" type="text" placeholder="As shown on card"></div></div>
    <div class="form-row"><div class="form-group"><label class="form-label">Expiry</label><input class="form-input" type="text" placeholder="MM / YY" maxlength="7"></div><div class="form-group"><label class="form-label">CVV</label><input class="form-input" type="text" placeholder="3 digits" maxlength="4"></div></div>`:`
    <div class="alert alert-info">${I.info}<span>You'll be redirected to complete your ${S.payMethod==="openbanking"?"open banking":S.payMethod} payment securely.</span></div>`}
  </div>
  <div class="card">
    <div class="card-title">Payment summary</div>
    <div class="summary-row"><span class="summary-key">Amount</span><span>£${amt.toFixed(2)}</span></div>
    <div class="summary-row"><span class="summary-key">Reference</span><span>${S.acct.ref}</span></div>
    <div class="summary-row"><span class="summary-key">New balance after payment</span><span>£${Math.max(0,S.acct.balance-amt).toFixed(2)}</span></div>
  </div>
  <button class="btn btn-primary btn-lg btn-block" onclick="doPay()" ${!S.payAmt||parseFloat(S.payAmt)<5?'disabled':''}>Pay £${amt.toFixed(2)} →</button>
  <p style="font-size:12px;color:var(--text-muted);text-align:center;margin-top:10px;">${I.shield.replace('class="nav-svg"','style="width:13px;height:13px;display:inline;vertical-align:middle;margin-right:3px;"')} Payments are processed securely. Card details are never stored.</p>`;
}

function rSchedule(){
  if(S.schedDone) return `<div class="success-screen"><div class="success-icon" style="background:var(--brand-light);">${I.cal.replace('class="nav-svg"','style="width:32px;height:32px;color:var(--brand-primary);"')}</div><div class="success-title">Payment scheduled</div><div class="success-desc">£${parseFloat(S.schedAmt).toFixed(2)} scheduled for <strong>${S.schedDate}</strong>.</div><div class="success-sub">We'll send a reminder before the payment is taken.</div><button class="btn btn-primary btn-lg" onclick="go('home')">Back to home</button></div>`;
  return `
  <div class="page-header"><div class="page-title">Schedule a payment</div><div class="page-subtitle">Choose a future date to make your payment.</div></div>
  <div class="card">
    <div class="card-title">${cic('cal')} Payment details</div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Payment date</label><input class="form-input" id="inp-sdate" type="date" value="${S.schedDate}" min="${new Date().toISOString().split('T')[0]}"></div>
      <div class="form-group"><label class="form-label">Amount (£)</label><input class="form-input" id="inp-samt" type="number" min="1" step="0.01" placeholder="0.00" value="${S.schedAmt||''}"></div>
    </div>
    <div class="form-group"><label class="form-label">Payment method</label><select class="form-select"><option>Debit card</option><option>Direct debit</option></select></div>
    <div class="alert alert-info mt-8">${I.info}<span>We'll send a confirmation email and a reminder 3 days before the payment is taken.</span></div>
    <button class="btn btn-primary btn-lg btn-block mt-8" onclick="doSchedule()">Schedule payment →</button>
  </div>`;
}

function rPlan(){
  if(S.planDone) return `<div class="success-screen"><div class="success-icon">${I.check}</div><div class="success-title">Plan set up successfully</div><div class="success-desc">£${parseFloat(S.planAmt).toFixed(2)} ${S.planFreq} — first payment next ${S.planFreq==="monthly"?"month":"week"}.</div><div class="success-sub">Confirmation sent to your email address.</div><button class="btn btn-primary btn-lg" onclick="go('home')">Back to home</button></div>`;
  const amt=parseFloat(S.planAmt)||0,pmts=amt>=5?Math.ceil(S.acct.balance/amt):null;
  return `
  <div class="page-header"><div class="page-title">Set up a payment plan</div><div class="page-subtitle">Spread your balance with affordable regular payments.</div></div>
  <div class="alert alert-info">${I.info}<div>We recommend completing the <a href="#" onclick="go('ie');return false;" style="color:var(--brand-primary);font-weight:600;">Budget Tool</a> first to help find the right amount for you.</div></div>
  <div class="card">
    <div class="card-title">${cic('plan')} Plan details</div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Frequency</label><select class="form-select" onchange="set({planFreq:this.value})"><option value="weekly" ${S.planFreq==="weekly"?"selected":""}>Weekly</option><option value="fortnightly" ${S.planFreq==="fortnightly"?"selected":""}>Fortnightly</option><option value="monthly" ${S.planFreq==="monthly"?"selected":""}>Monthly</option></select></div>
      <div class="form-group"><label class="form-label">Amount (£)</label><input class="form-input" id="inp-plnamt" type="number" min="1" step="0.01" placeholder="0.00" value="${S.planAmt}" oninput="S.planAmt=this.value;render();"><p class="form-hint">Minimum £5.00</p></div>
    </div>
    <div class="form-group"><label class="form-label">Collection method</label><select class="form-select"><option>Direct debit</option><option>Recurring card payment</option></select></div>
  </div>
  ${amt>=5?`<div class="card"><div class="card-title">Plan summary</div>
    <div class="summary-row"><span class="summary-key">Balance</span><span>£${S.acct.balance.toFixed(2)}</span></div>
    <div class="summary-row"><span class="summary-key">${S.planFreq.charAt(0).toUpperCase()+S.planFreq.slice(1)} payment</span><span>£${amt.toFixed(2)}</span></div>
    <div class="summary-row"><span class="summary-key">Estimated completion</span><span>~${pmts} payments</span></div>
  </div><button class="btn btn-primary btn-lg btn-block" onclick="doPlan()">Confirm plan →</button>`:''}`;
}

function rIE(){
  if(S.ieDone) return `<div class="success-screen"><div class="success-icon">${I.check}</div><div class="success-title">Budget saved</div>
    <div class="success-desc">Monthly ${S.ieSurplus>=0?"surplus":"deficit"}: <strong style="color:${S.ieSurplus>=0?"var(--brand-success)":"var(--brand-danger)"};">${S.ieSurplus>=0?"+":""}£${Math.abs(S.ieSurplus||0).toFixed(2)}</strong></div>
    <div class="success-sub">Your income & expenditure has been recorded against your account.</div>
    ${S.ieSurplus>0?`<div class="alert alert-success" style="text-align:left;margin-bottom:20px;">${I.info}<span>Based on your budget you could comfortably afford <strong>£${S.ieSurplus.toFixed(2)}/month</strong>. <a href="#" onclick="set({planAmt:'${S.ieSurplus.toFixed(2)}',ieDone:false});go('plan');return false;">Set up a plan →</a></span></div>`:''}
    <button class="btn btn-primary btn-lg" onclick="go('home')">Back to home</button></div>`;
  const cats={"Monthly income":["Employment income","Benefits / Tax credits","Pension","Other income"],"Housing & utilities":["Rent / Mortgage","Council tax","Gas","Electricity","Water","Buildings & contents insurance"],"Living costs":["Food & groceries","Clothing & footwear","Medical & dental","Childcare","School costs","Personal care"],"Transport":["Car finance","Fuel","Public transport","Car insurance","Road tax & MOT"],"Other":["Mobile phone","Broadband","TV licence","Subscriptions","Other debt payments","Savings"]};
  const inc=cats["Monthly income"].reduce((s,k)=>s+(parseFloat(S.ie[k])||0),0);
  const out=Object.entries(cats).filter(([k])=>k!=="Monthly income").flatMap(([,v])=>v).reduce((s,k)=>s+(parseFloat(S.ie[k])||0),0);
  const surp=inc-out;
  return `
  <div class="page-header"><div class="page-title">Budget tool</div><div class="page-subtitle">Complete your income & expenditure so we can suggest an affordable plan.</div></div>
  <div class="card">
    ${Object.entries(cats).map(([sec,items])=>`<div class="ie-section"><div class="ie-section-title">${sec}</div>${items.map(item=>`<div class="ie-row"><span class="ie-row-label">${item}</span><div class="ie-input-wrap"><span class="ie-prefix">£</span><input class="ie-input" type="number" min="0" step="1" placeholder="0" value="${S.ie[item]||''}" oninput="S.ie['${item}']=this.value;render();"></div></div>`).join('')}</div>`).join('')}
    <div class="ie-totals">
      <div class="ie-total-row"><span>Total monthly income</span><strong>£${inc.toFixed(2)}</strong></div>
      <div class="ie-total-row"><span>Total monthly outgoings</span><strong>£${out.toFixed(2)}</strong></div>
      <div class="ie-total-row result ${surp>=0?"surplus":"deficit"}"><span>${surp>=0?"Monthly surplus":"Monthly deficit"}</span><strong>${surp>=0?"+":""}£${surp.toFixed(2)}</strong></div>
    </div>
    <button class="btn btn-primary btn-lg btn-block mt-16" onclick="doIE(${surp})">Save budget →</button>
  </div>`;
}

function rDiscount(){
  const a=S.acct,settle=(a.balance*0.6).toFixed(2);
  return `
  <div class="page-header"><div class="page-title">Discount offers</div><div class="page-subtitle">Special offers available on your account right now.</div></div>
  <div class="offer-card">
    <div class="offer-badge">✦ Exclusive offer</div>
    <div class="offer-title">Full &amp; final settlement</div>
    <div class="offer-desc">Clear your account today with a single reduced payment. This time-limited offer will clear your balance in full once accepted.</div>
    <div class="offer-was">Full balance: £${a.balance.toFixed(2)}</div>
    <div class="offer-amount">£${settle}</div>
    <div style="display:flex;gap:12px;flex-wrap:wrap;"><button class="btn btn-accent btn-lg" onclick="go('pay')">Accept &amp; pay →</button><button class="btn" style="background:rgba(255,255,255,0.1);color:white;border:1px solid rgba(255,255,255,0.25);" onclick="showTerms()">View terms</button></div>
  </div>
  <div class="card"><div class="card-title">${cic('info')} How settlement works</div>
    <div style="display:flex;flex-direction:column;gap:14px;">${[["1","Pay the settlement amount","Make a single payment of £"+settle+" and your account will be cleared immediately."],["2","Account marked as settled","Your account will be marked as settled — not paid in full."],["3","Credit file update","The account will be updated on your credit file as partially settled within 30 days."]].map(([n,t,d])=>`<div style="display:flex;gap:12px;align-items:flex-start;"><div style="width:28px;height:28px;border-radius:50%;background:var(--brand-light);color:var(--brand-primary);font-weight:700;font-size:13px;display:flex;align-items:center;justify-content:center;flex-shrink:0;">${n}</div><div><div style="font-weight:600;font-size:14px;margin-bottom:2px;">${t}</div><div style="font-size:13px;color:var(--text-secondary);line-height:1.5;">${d}</div></div></div>`).join('')}</div>
  </div>`;
}

function rTx(){
  const txs=TXS[S.acct.ref]||[];
  return `
  <div class="page-header"><div class="page-title">Transactions</div><div class="page-subtitle">Full payment history for account ${S.acct.ref}.</div></div>
  <div class="card">
    ${txs.length===0?`<div style="text-align:center;padding:40px 20px;">${I.list.replace('class="nav-svg"','style="width:44px;height:44px;color:var(--text-muted);display:block;margin:0 auto 14px;"')}<h3 style="font-size:16px;font-weight:600;margin-bottom:6px;">No transactions yet</h3><p style="font-size:14px;color:var(--text-secondary);">Once you make a payment it will appear here.</p><button class="btn btn-primary mt-16" onclick="go('pay')">Make a payment</button></div>`:`
    <div class="tx-list">${txs.map(t=>`<div class="tx-item"><div class="tx-left"><div class="tx-icon ${t.type}">${t.type==="credit"?I.up:t.type==="debit"?I.down:I.plan.replace('class="nav-svg"','')}</div><div><div class="tx-desc">${t.desc}</div><div class="tx-date">${t.date}</div></div></div>${t.amount?`<div class="tx-amount ${t.type}">${t.type==="credit"?"+":"-"}£${t.amount.toFixed(2)}</div>`:`<div class="badge badge-blue">Plan</div>`}</div>`).join('')}</div>`}
  </div>`;
}

function rDetails(){
  const a=S.acct;
  return `
  <div class="page-header"><div class="page-title">My details</div><div class="page-subtitle">Keep your contact information up to date.</div></div>
  <div class="card"><div class="card-title">${cic('user')} Personal information</div>
    <div class="form-row"><div class="form-group"><label class="form-label">First name</label><input class="form-input" type="text" value="${S.user.name.split(' ')[0]}"></div><div class="form-group"><label class="form-label">Last name</label><input class="form-input" type="text" value="${S.user.name.split(' ').slice(1).join(' ')}"></div></div>
    <div class="form-group"><label class="form-label">Email address</label><input class="form-input" type="email" value="${S.user.email||'user@example.com'}"></div>
    <div class="form-group"><label class="form-label">Phone number</label><input class="form-input" type="tel" placeholder="07xxx xxxxxx"></div>
    <div class="form-group"><label class="form-label">Address line 1</label><input class="form-input" type="text" placeholder="Street address"></div>
    <div class="form-row"><div class="form-group"><label class="form-label">Town / City</label><input class="form-input" type="text"></div><div class="form-group"><label class="form-label">Postcode</label><input class="form-input" type="text" value="${a?a.postcode:''}"></div></div>
    <button class="btn btn-primary mt-8" onclick="alert('Details updated.')">Save changes</button>
  </div>
  <div class="card"><div class="card-title">${cic('shield')} Change password</div>
    <div class="form-group"><label class="form-label">Current password</label><input class="form-input" type="password" placeholder="••••••••"></div>
    <div class="form-group"><label class="form-label">New password</label><input class="form-input" type="password" placeholder="Minimum 8 characters"></div>
    <div class="form-group"><label class="form-label">Confirm new password</label><input class="form-input" type="password" placeholder="Repeat password"></div>
    <button class="btn btn-outline mt-8">Update password</button>
  </div>`;
}

function rOB(){
  const banks=[{n:"Barclays",c:"#00AEEF",l:"B"},{n:"Lloyds",c:"#006A4E",l:"L"},{n:"NatWest",c:"#5A1E82",l:"N"},{n:"HSBC",c:"#DB0011",l:"H"},{n:"Halifax",c:"#009BDE",l:"H"},{n:"Monzo",c:"#FF3464",l:"M"}];
  return `
  <div class="page-header"><div class="page-title">Open banking</div><div class="page-subtitle">Share your bank data securely to help us understand your situation.</div></div>
  <div class="alert alert-info">${I.shield}<div><strong>FCA regulated & secure.</strong> Open banking uses regulated connections — we never see your login details or store your banking password.</div></div>
  <div class="card"><div class="card-title">${cic('bank')} Why use open banking?</div>
    <div style="display:flex;flex-direction:column;gap:14px;margin-bottom:24px;">${[[I.chart,"Faster budget assessment","We automatically calculate your income and spending — no manual forms."],[I.tag,"Better tailored offers","Real financial data means more accurate settlement and plan offers."],[I.shield,"Secure & encrypted","Protected under FCA open banking regulations and encrypted in transit."]].map(([icon,t,d])=>`<div style="display:flex;gap:12px;align-items:flex-start;"><div style="width:36px;height:36px;border-radius:50%;background:var(--brand-light);display:flex;align-items:center;justify-content:center;flex-shrink:0;">${icon.replace('class="nav-svg"','style="width:18px;height:18px;color:var(--brand-primary);"')}</div><div><div style="font-weight:600;font-size:14px;margin-bottom:2px;">${t}</div><div style="font-size:13px;color:var(--text-secondary);line-height:1.5;">${d}</div></div></div>`).join('')}</div>
    <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.6px;color:var(--text-muted);margin-bottom:12px;">Select your bank</div>
    <div class="ob-providers">${banks.map(b=>`<div class="ob-provider" onclick="alert('Connecting to ${b.n}... (demo)')"><div class="ob-provider-logo" style="background:${b.c}20;color:${b.c};">${b.l}</div><div class="ob-provider-name">${b.n}</div></div>`).join('')}</div>
    <button class="btn btn-ghost btn-block">Don't see your bank? Search all →</button>
  </div>`;
}

function rBreathing(){
  if(S.breathing){
    const exp=new Date(Date.now()+60*24*60*60*1000).toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'});
    return `<div class="success-screen"><div class="success-icon" style="background:#d1fae5;">${I.leaf.replace('class="nav-svg"','style="width:32px;height:32px;color:var(--brand-success);"')}</div><div class="success-title">Breathing space active</div><div style="margin-bottom:14px;"><span class="badge badge-green">Active until ${exp}</span></div><div class="success-desc">You are protected under the Debt Respite Scheme for 60 days.</div><div class="success-sub">All contact and debt collection activity has been paused.</div><button class="btn btn-primary btn-lg" onclick="go('home')">Back to home</button></div>`;
  }
  return `
  <div class="page-header"><div class="page-title">Breathing space</div><div class="page-subtitle">Legal protection while you get debt advice and make a plan.</div></div>
  <div class="card"><div class="card-title">${cic('leaf')} What is breathing space?</div>
    <p style="font-size:14px;color:var(--text-secondary);margin-bottom:18px;line-height:1.7;">The Debt Respite Scheme gives people in problem debt the right to legal protections from creditor action while they get advice and make a plan to deal with their debts.</p>
    <div class="bs-grid">${[[I.clock,"Pauses collection","All contact and debt collection activity is paused for the duration."],[I.shield,"60 days protection","Standard breathing space provides 60 days of legal protection."],[I.leaf,"Mental health variant","Extended protection for those receiving mental health crisis treatment."],[I.info,"England & Wales only","This is a legal right under the Debt Respite Scheme (England & Wales)."]].map(([icon,t,d])=>`<div class="bs-point"><div class="bs-icon">${icon.replace('class="nav-svg"','style="width:16px;height:16px;color:var(--brand-primary);"')}</div><div><div class="bs-point-title">${t}</div><div class="bs-point-desc">${d}</div></div></div>`).join('')}</div>
    <div class="alert alert-warning">${I.warn}<div>Breathing space must be applied for through a <strong>free debt adviser</strong>, not directly. Use the link below to find help.</div></div>
    <div style="display:flex;gap:12px;flex-wrap:wrap;"><button class="btn btn-primary" onclick="set({breathing:true})">${I.leaf.replace('class="nav-svg"','style="width:16px;height:16px;"')} Request breathing space</button><a href="https://www.moneyhelper.org.uk" target="_blank" class="btn btn-outline">Find free debt advice →</a></div>
  </div>`;
}

// ── Actions ──
function doRef(){const ref=document.getElementById('inp-ref').value.trim();if(!DATA.find(a=>a.ref===ref)){document.getElementById('ref-err').classList.remove('hidden');return;}set({loginRef:ref,step:'idv'});}
function doIDV(){const dob=document.getElementById('inp-dob').value,pc=document.getElementById('inp-pc').value.trim().toUpperCase().replace(/\s/g,'');const a=DATA.find(x=>x.ref===S.loginRef);if(dob!==a.dob||pc!==a.postcode.replace(/\s/g,'').toUpperCase()){document.getElementById('idv-err').classList.remove('hidden');return;}set({loginDob:dob,loginPc:pc,step:'register'});}
function doReg(){const email=document.getElementById('inp-email').value,pass=document.getElementById('inp-pass').value,pass2=document.getElementById('inp-pass2').value,err=document.getElementById('reg-err'),txt=document.getElementById('reg-err-txt');if(!email||!pass){txt.textContent='Please complete all fields.';err.classList.remove('hidden');return;}if(pass.length<8){txt.textContent='Password must be at least 8 characters.';err.classList.remove('hidden');return;}if(pass!==pass2){txt.textContent='Passwords do not match.';err.classList.remove('hidden');return;}const a=DATA.find(x=>x.ref===S.loginRef);set({screen:'home',user:{name:a.name,email,accounts:DATA.filter(x=>x.dob===a.dob)},acct:a});}
function switchAcct(ref){set({acct:DATA.find(a=>a.ref===ref),screen:'home'});}
function doPay(){const el=document.getElementById('inp-payamt');const amt=parseFloat(el?el.value:S.payAmt);if(!amt||amt<5){alert('Minimum payment is £5.00');return;}S.acct.balance=Math.max(0,S.acct.balance-amt);set({payDone:true,payAmt:amt.toString()});}
function doSchedule(){const d=document.getElementById('inp-sdate').value,a=document.getElementById('inp-samt').value;if(!d||!a){alert('Please complete all fields.');return;}set({schedDone:true,schedDate:d,schedAmt:a});}
function doPlan(){set({planDone:true});}
function doIE(s){set({ieDone:true,ieSurplus:s});}
function showTerms(){alert('Settlement terms:\n\n• Payment must be made in full on the agreed date.\n• Account will be marked as "Partially Settled" on your credit file.\n• This offer may be withdrawn at any time.\n• Offer valid for 30 days.');}
function bindEvents(){const r=document.getElementById('inp-ref');if(r)r.addEventListener('keypress',e=>{if(e.key==='Enter')doRef();});}

render();
</script>
</body>
</html>
